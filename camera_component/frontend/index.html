<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://unpkg.com/streamlit-component-lib@2.0.0/dist/streamlit-component-lib.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#111;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start;
    min-height:100vh; font-family:sans-serif;
    padding: 8px;
  }
  #container { position:relative; width:100%; max-width:500px; }
  video { width:100%; border-radius:12px; display:block; }
  canvas { display:none; }
  #mira {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:180px; height:180px;
    border: 3px solid rgba(0,255,120,0.85);
    border-radius:14px;
    box-shadow: 0 0 0 4000px rgba(0,0,0,0.45);
    pointer-events:none;
  }
  #status {
    margin-top:10px; padding:12px 16px; border-radius:10px;
    font-size:0.95rem; font-weight:bold; text-align:center; color:white;
    background:#333; width:100%; max-width:500px;
    transition: background 0.3s;
    min-height: 46px;
  }
  #status.ok   { background: linear-gradient(135deg,#1a7a4a,#25a060); }
  #status.warn { background: linear-gradient(135deg,#8b6914,#c9960c); }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="mira"></div>
</div>
<div id="status">Aponte a camera para o QR Code...</div>

<script>
var video    = document.getElementById('video');
var canvas   = document.getElementById('canvas');
var statusEl = document.getElementById('status');
var ctx      = canvas.getContext('2d');
var scanning = true;
var lastCode = '';
var lastTime = 0;
var COOLDOWN = 3500;

// Inicializa o componente Streamlit
Streamlit.setFrameHeight(420);

navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
}).then(function(stream) {
  video.srcObject = stream;
  video.play();
  requestAnimationFrame(scan);
}).catch(function(err) {
  statusEl.textContent = 'Permita o acesso a camera. Erro: ' + err.name;
  statusEl.className = 'warn';
  Streamlit.setFrameHeight(80);
});

function scan() {
  if (!scanning || video.readyState !== video.HAVE_ENOUGH_DATA) {
    requestAnimationFrame(scan); return;
  }
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  var code = jsQR(imageData.data, imageData.width, imageData.height, {
    inversionAttempts: 'dontInvert'
  });

  if (code && code.data) {
    var now = Date.now();
    if (code.data === lastCode && (now - lastTime) < COOLDOWN) {
      requestAnimationFrame(scan); return;
    }
    lastCode = code.data;
    lastTime = now;

    statusEl.textContent = 'Lido: ' + code.data + ' - Registrando...';
    statusEl.className   = 'ok';
    scanning = false;

    // Envia o valor para o Python via Streamlit bidirectional component
    Streamlit.setComponentValue(code.data);

    setTimeout(function() {
      statusEl.textContent = 'Aponte para o proximo QR Code...';
      statusEl.className   = '';
      scanning = true;
    }, 2500);
  }

  requestAnimationFrame(scan);
}
</script>
</body>
</html>
